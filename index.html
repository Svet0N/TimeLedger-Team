<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShiftFlow</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Language switcher top-left -->
  <div class="lang-switcher-top">
    <button class="lang-btn active" onclick="setLang('bg',this)">BG</button>
    <button class="lang-btn" onclick="setLang('en',this)">EN</button>
    <button class="lang-btn" onclick="setLang('ru',this)">RU</button>
  </div>

  <div class="login-wrapper">
    <div class="login-card glass-card">
      <div class="login-logo">
        <span class="logo-icon">⏱</span>
        <span class="logo-text">ShiftFlow</span>
      </div>
      <p class="login-sub" data-i18n="login_sub">Управление на работни смени</p>

      <div id="login-error" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label class="form-label" data-i18n="lbl_username">Потребителско име</label>
        <input type="text" id="username" class="form-input" autocomplete="username"
               placeholder="manager1" onkeydown="if(event.key==='Enter')handleLogin()" />
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="lbl_password">Парола</label>
        <div class="input-with-icon">
          <input type="password" id="password" class="form-input" autocomplete="current-password"
                 placeholder="••••••••" onkeydown="if(event.key==='Enter')handleLogin()" />
          <button class="toggle-pass" onclick="togglePassVis()" tabindex="-1">👁</button>
        </div>
      </div>

      <button class="btn btn-primary btn-full" id="login-btn" onclick="handleLogin()" style="margin-top:0.5rem">
        <span id="login-btn-text" data-i18n="btn_login">Вход</span>
        <span id="login-spinner" class="spinner hidden"></span>
      </button>

      <p class="login-hint">
        <span data-i18n="hint_manager">Мениджър</span>: <code>manager1 / 1234</code><br/>
        <span data-i18n="hint_employees">Служители</span>: <code>emp1</code> · <code>emp2</code> · <code>emp3</code> · <code>emp4</code> / <code>1234</code>
      </p>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script>
    applyTheme();
    applyLang();
    function togglePassVis() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
