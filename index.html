<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TimeLedger Team</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet" />
</head>

<body class="login-page">

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Language switcher top-left -->
  <div class="lang-switcher-top">
    <button class="lang-btn active" onclick="setLang('bg',this)">BG</button>
    <button class="lang-btn" onclick="setLang('en',this)">EN</button>
    <button class="lang-btn" onclick="setLang('ru',this)">RU</button>
  </div>

  <div class="login-wrapper">
    <div class="login-card glass-card">
      <div class="login-logo">
        <span class="logo-icon">⏱</span>
        <span class="logo-text">TimeLedger Team</span>
      </div>
      <p class="login-sub" data-i18n="login_sub">Управление на работни смени</p>

      <div id="login-error" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label class="form-label" data-i18n="lbl_username">Потребителско име</label>
        <input type="text" id="username" class="form-input" autocomplete="username" placeholder="manager1"
          onkeydown="if(event.key==='Enter')handleLogin()" />
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="lbl_password">Парола</label>
        <div class="input-with-icon">
          <input type="password" id="password" class="form-input" autocomplete="current-password" placeholder="••••••••"
            onkeydown="if(event.key==='Enter')handleLogin()" />
          <button class="toggle-pass" onclick="togglePassVis()" tabindex="-1">👁</button>
        </div>
      </div>

      <button class="btn btn-primary btn-full" id="login-btn" onclick="handleLogin()" style="margin-top:0.5rem">
        <span id="login-btn-text" data-i18n="btn_login">Вход</span>
        <span id="login-spinner" class="spinner hidden"></span>
      </button>

      <p class="login-hint" id="login-hint-text">
        <span data-i18n="hint_manager">Мениджър</span>: <code>manager1 / 1234</code><br />
        <span data-i18n="hint_employees">Служители</span>: <code>emp1</code> · <code>emp2</code> · <code>emp3</code> ·
        <code>emp4</code> / <code>1234</code><br />
        <span style="color:var(--purple);font-weight:700">SuperAdmin</span>: <code>superadmin / admin123</code>
      </p>

      <div style="text-align:center;margin-top:0.75rem">
        <button onclick="hardReset()"
          style="background:none;border:none;cursor:pointer;font-size:0.68rem;color:var(--text-faint);text-decoration:underline;font-family:inherit">
          🔄 Нулиране на демо данните
        </button>
      </div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script>
    applyTheme();
    applyLang();

    // Ensure superadmin is always available on login page load
    if (typeof ensureSuperAdmin === 'function') ensureSuperAdmin();

    function togglePassVis() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }

    function hardReset() {
      if (!confirm('Това ще изтрие всички данни и ще ги нулира. Продължаваш?')) return;
      // Clear all app data
      const keys = Object.keys(localStorage).filter(k => k.startsWith('sf_'));
      keys.forEach(k => localStorage.removeItem(k));
      // Unregister service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
        caches.keys().then(cacheNames => {
          cacheNames.forEach(name => caches.delete(name));
        });
      }
      setTimeout(() => window.location.reload(true), 300);
    }
  </script>

</body>

</html>
